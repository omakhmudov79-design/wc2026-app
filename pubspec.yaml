name: wc2026_analyst
description: World Cup 2026 AI Football Analysis App with Claude API Integration
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0
  
  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # State Management
  provider: ^6.0.0
  
  # UI & Design
  google_fonts: ^6.1.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.2
  
  # Calendar & Notifications
  table_calendar: ^3.0.9
  flutter_local_notifications: ^15.0.0
  timezone: ^0.9.0
  
  # Calendar Integration
  device_calendar: ^4.9.0
  
  # Serialization
  json_serializable: ^6.7.0
  
  # Utils
  connectivity_plus: ^5.0.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/flags/
  
  fonts:
    - family: BebasNeue
      fonts:
        - asset: assets/fonts/BebasNeue-Regular.ttf
