name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'gradle'
    
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
        channel: 'stable'
        cache: true
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build code generation
      run: flutter pub run build_runner build --delete-conflicting-outputs || true
    
    - name: Build APK (Debug)
      run: flutter build apk --debug 2>&1 || true
    
    - name: Build APK (Release)
      run: flutter build apk --release 2>&1 || true
    
    - name: Upload Debug APK if exists
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-debug
        path: build/app/outputs/flutter-apk/app-debug.apk
        if-no-files-found: ignore
    
    - name: Upload Release APK if exists
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/app-release.apk
        if-no-files-found: ignore
